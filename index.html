<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EAI - Robot Hardware Live Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --bg: #06090f;
    --card-bg: #0c1018;
    --card-border: #1a2035;
    --card-hover: #1e2a45;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --accent: #3b82f6;
    --green: #22c55e;
    --green-glow: #22c55e55;
    --red: #ef4444;
    --red-glow: #ef444455;
    --yellow: #eab308;
    --purple: #a78bfa;
    --cyan: #06b6d4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 400px;
    background: radial-gradient(ellipse, rgba(59,130,246,0.08), transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(6,9,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(59,130,246,0.1);
    padding: 20px 32px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
  }

  .header-left { display: flex; align-items: center; gap: 20px; }

  .logo-icon {
    width: 42px; height: 42px;
    display: flex; align-items: center; justify-content: center;
  }

  .header h1 {
    font-size: 20px; font-weight: 700; letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff, #94a3b8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header h1 b {
    background: linear-gradient(135deg, var(--accent), var(--cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    font-weight: 800;
  }

  .header-right { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }

  .summary { display: flex; gap: 20px; font-size: 13px; font-weight: 600; }
  .summary-item { display: flex; align-items: center; gap: 8px; }
  .summary-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px; font-weight: 700;
  }
  .summary-count.green { color: var(--green); }
  .summary-count.red { color: var(--red); }
  .summary-label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

  .bulk-actions { display: flex; gap: 8px; }
  .bulk-btn {
    padding: 8px 16px; border-radius: 10px; border: 1px solid var(--card-border);
    background: rgba(255,255,255,0.03); color: var(--text-dim);
    font-size: 12px; font-weight: 600; font-family: 'Inter', sans-serif;
    cursor: pointer; transition: all 0.2s;
  }
  .bulk-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
  .bulk-btn.all-on:hover { border-color: var(--green); color: var(--green); box-shadow: 0 0 12px var(--green-glow); }
  .bulk-btn.all-off:hover { border-color: var(--red); color: var(--red); box-shadow: 0 0 12px var(--red-glow); }

  .last-updated { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }

  .container { max-width: 1500px; margin: 0 auto; padding: 28px; position: relative; z-index: 1; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    overflow: visible;
    transition: all 0.3s ease;
    position: relative;
    cursor: pointer;
    display: flex;
    flex-direction: column;
  }
  .card::before {
    content: '';
    position: absolute; inset: -2px;
    border-radius: 18px;
    background: transparent;
    z-index: -1;
    transition: opacity 0.4s;
    opacity: 0;
  }
  .card.online {
    border-color: rgba(34,197,94,0.3);
    box-shadow: 0 0 20px rgba(34,197,94,0.08);
  }
  .card.online::before {
    opacity: 1;
    background: conic-gradient(from var(--angle, 0deg), transparent 0%, #4ade80 10%, transparent 20%);
    animation: rotate-border 8s linear infinite;
  }
  .card.offline {
    border-color: rgba(239,68,68,0.3);
    box-shadow: 0 0 15px rgba(239,68,68,0.1);
  }
  .card.offline::before {
    opacity: 1;
    background: rgba(239,68,68,0.15);
  }
  @keyframes rotate-border {
    0% { --angle: 0deg; }
    100% { --angle: 360deg; }
  }
  @property --angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }
  .card::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 16px;
    background: var(--card-bg);
    z-index: -1;
  }
  .card:hover {
    border-color: var(--card-hover);
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    transform: translateY(-2px);
  }
  .card.online:hover {
    box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 30px rgba(34,197,94,0.15);
  }

  .card-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 20px 24px 16px;
  }

  .card-title-area { display: flex; align-items: center; gap: 12px; }

  .robot-icon {
    width: 48px; height: 48px; flex-shrink: 0;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .card.offline .robot-icon { border-color: rgba(239,68,68,0.1); }
  .card.online .robot-icon { border-color: rgba(34,197,94,0.12); box-shadow: 0 0 16px rgba(34,197,94,0.08); }

  .card-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
  .card-subtitle {
    font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
    color: var(--cyan); text-transform: uppercase; margin-top: 2px;
  }
  .card-type { font-size: 12px; color: var(--text-dim); font-weight: 500; margin-top: 2px; }

  .status-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px; border-radius: 24px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.5px;
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.3s; flex-shrink: 0;
  }
  .status-pill.online {
    background: rgba(34,197,94,0.1);
    color: var(--green);
    border: 1px solid rgba(34,197,94,0.2);
  }
  .status-pill.offline {
    background: rgba(239,68,68,0.08);
    color: var(--red);
    border: 1px solid rgba(239,68,68,0.15);
  }

  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    transition: all 0.3s;
  }
  .status-dot.online {
    background: var(--green);
    box-shadow: 0 0 10px var(--green-glow);
    animation: pulse 2s infinite;
  }
  .status-dot.offline {
    background: var(--red);
    box-shadow: 0 0 6px var(--red-glow);
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 10px var(--green-glow); }
    50% { box-shadow: 0 0 20px rgba(34,197,94,0.5); }
  }

  .card-body { padding: 0 24px 16px; flex: 1; }

  .robot-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .robot-table th {
    text-align: left; font-size: 10px; font-weight: 700;
    color: var(--accent); text-transform: uppercase; letter-spacing: 1px;
    padding: 0 0 8px 0; border-bottom: 1px solid var(--card-border);
  }
  .robot-table td {
    padding: 8px 0; color: var(--text-dim); border-bottom: 1px solid rgba(26,32,53,0.5);
  }
  .robot-table td:first-child { color: var(--text); font-weight: 600; width: 100px; }
  .robot-table tr:last-child td { border-bottom: none; }

  .notes-section { margin-top: 12px; }
  .notes-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .note-tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 10px; border-radius: 8px;
    font-size: 11px; font-weight: 600;
    background: rgba(234,179,8,0.1); color: var(--yellow); border: 1px solid rgba(234,179,8,0.15);
    transition: all 0.2s;
  }
  .note-tag:hover { background: rgba(234,179,8,0.18); }
  .note-tag .remove-note {
    cursor: pointer; opacity: 0.5; transition: opacity 0.2s;
    font-size: 14px; line-height: 1; margin-left: 2px;
  }
  .note-tag .remove-note:hover { opacity: 1; }
  .note-tag .note-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: var(--yellow); }
  .note-input-wrap { position: relative; }
  .note-input {
    width: 100%; background: rgba(255,255,255,0.02);
    border: 1px solid var(--card-border); border-radius: 8px;
    color: var(--text); font-size: 12px; padding: 8px 12px;
    font-family: 'Inter', sans-serif; outline: none;
    transition: border-color 0.2s;
  }
  .note-input:focus { border-color: var(--accent); box-shadow: 0 0 12px rgba(59,130,246,0.1); }
  .note-input::placeholder { color: #334155; }
  .note-hint { font-size: 10px; color: #334155; margin-top: 4px; text-align: right; }

  .card-footer {
    padding: 14px 24px;
    border-top: 1px solid var(--card-border);
    display: flex; align-items: center; justify-content: space-between;
  }

  .toggle-btn {
    padding: 8px 20px; border-radius: 10px;
    border: none;
    font-size: 12px; font-weight: 700; font-family: 'Inter', sans-serif;
    cursor: pointer; transition: all 0.25s;
    letter-spacing: 0.3px;
  }
  .card.offline .toggle-btn {
    background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(34,197,94,0.05));
    color: var(--green);
    border: 1px solid rgba(34,197,94,0.25);
  }
  .card.offline .toggle-btn:hover {
    background: linear-gradient(135deg, rgba(34,197,94,0.25), rgba(34,197,94,0.1));
    box-shadow: 0 0 20px var(--green-glow);
  }
  .card.online .toggle-btn {
    background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(239,68,68,0.05));
    color: var(--red);
    border: 1px solid rgba(239,68,68,0.25);
  }
  .card.online .toggle-btn:hover {
    background: linear-gradient(135deg, rgba(239,68,68,0.25), rgba(239,68,68,0.1));
    box-shadow: 0 0 20px var(--red-glow);
  }

  .status-time {
    font-size: 11px; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }

  .click-hint {
    font-size: 10px; color: #334155; text-align: center; padding: 6px 0 2px;
    letter-spacing: 0.5px;
  }

  /* === DETAIL VIEW === */
  #detail-view {
    display: none;
    position: relative; z-index: 1;
  }
  #detail-view.active { display: block; }
  #grid-view.hidden { display: none; }

  .detail-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 28px;
  }

  .back-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px; border-radius: 12px;
    border: 1px solid var(--card-border);
    background: rgba(255,255,255,0.03); color: var(--text-dim);
    font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif;
    cursor: pointer; transition: all 0.2s;
    margin-bottom: 24px;
  }
  .back-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); border-color: var(--accent); }
  .back-btn svg { width: 16px; height: 16px; }

  .detail-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    overflow: hidden;
    position: relative;
  }
  .detail-card::before {
    content: '';
    position: absolute; inset: -2px;
    border-radius: 22px;
    z-index: -1;
    transition: opacity 0.4s;
    opacity: 0;
  }
  .detail-card.online { border-color: rgba(34,197,94,0.3); box-shadow: 0 0 30px rgba(34,197,94,0.08); }
  .detail-card.online::before {
    opacity: 1;
    background: conic-gradient(from var(--angle, 0deg), transparent 0%, #4ade80 10%, transparent 20%);
    animation: rotate-border 8s linear infinite;
  }
  .detail-card.offline { border-color: rgba(239,68,68,0.3); box-shadow: 0 0 20px rgba(239,68,68,0.1); }
  .detail-card.offline::before { opacity: 1; background: rgba(239,68,68,0.15); }
  .detail-card::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 20px;
    background: var(--card-bg);
    z-index: -1;
  }

  .detail-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--card-border);
  }
  .detail-header-left { display: flex; align-items: center; gap: 16px; }
  .detail-icon {
    width: 64px; height: 64px; flex-shrink: 0;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .detail-card.online .detail-icon { border-color: rgba(34,197,94,0.12); box-shadow: 0 0 20px rgba(34,197,94,0.08); }
  .detail-name { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .detail-type { font-size: 13px; color: var(--text-dim); font-weight: 500; margin-top: 2px; }
  .detail-subtitle { font-size: 12px; color: var(--cyan); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  .detail-body { padding: 24px 32px; }

  .detail-section {
    margin-bottom: 28px;
  }
  .detail-section:last-child { margin-bottom: 0; }
  .detail-section-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--accent); margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .detail-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--card-border), transparent);
  }

  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }
  .info-item {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .info-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim); margin-bottom: 6px;
  }
  .info-value {
    font-size: 15px; font-weight: 600; color: var(--text);
    font-family: 'JetBrains Mono', monospace;
  }
  .info-value.ip { color: var(--cyan); }
  .info-value.task-val { color: var(--purple); font-family: 'Inter', sans-serif; font-size: 14px; }
  .info-value.mobility-yes { color: var(--green); }
  .info-value.mobility-no { color: var(--text-dim); }
  .info-value.status-label { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; }

  .detail-robot-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .detail-robot-table th {
    text-align: left; font-size: 10px; font-weight: 700;
    color: var(--accent); text-transform: uppercase; letter-spacing: 1px;
    padding: 10px 12px; border-bottom: 1px solid var(--card-border);
    background: rgba(59,130,246,0.03);
  }
  .detail-robot-table td {
    padding: 12px; color: var(--text-dim); border-bottom: 1px solid rgba(26,32,53,0.5);
  }
  .detail-robot-table td:first-child { color: var(--text); font-weight: 600; }
  .detail-robot-table tr:last-child td { border-bottom: none; }
  .detail-robot-table .payload-cell { color: var(--yellow); font-family: 'JetBrains Mono', monospace; font-weight: 600; }
  .detail-robot-table .span-cell { color: var(--cyan); font-family: 'JetBrains Mono', monospace; font-weight: 600; }

  .detail-footer {
    padding: 20px 32px;
    border-top: 1px solid var(--card-border);
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }

  .detail-toggle-btn {
    padding: 10px 28px; border-radius: 12px;
    border: none;
    font-size: 13px; font-weight: 700; font-family: 'Inter', sans-serif;
    cursor: pointer; transition: all 0.25s;
    letter-spacing: 0.3px;
  }
  .detail-card.offline .detail-toggle-btn {
    background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(34,197,94,0.05));
    color: var(--green);
    border: 1px solid rgba(34,197,94,0.25);
  }
  .detail-card.offline .detail-toggle-btn:hover {
    background: linear-gradient(135deg, rgba(34,197,94,0.25), rgba(34,197,94,0.1));
    box-shadow: 0 0 20px var(--green-glow);
  }
  .detail-card.online .detail-toggle-btn {
    background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(239,68,68,0.05));
    color: var(--red);
    border: 1px solid rgba(239,68,68,0.25);
  }
  .detail-card.online .detail-toggle-btn:hover {
    background: linear-gradient(135deg, rgba(239,68,68,0.25), rgba(239,68,68,0.1));
    box-shadow: 0 0 20px var(--red-glow);
  }

  .detail-notes-section { margin-top: 0; }
  .detail-notes-section .notes-list { margin-bottom: 10px; }
  .detail-notes-section .note-input { font-size: 13px; padding: 10px 14px; }

  /* UR Arm IP Tooltip */
  .ur-model {
    position: relative;
    cursor: pointer;
    border-bottom: 1px dashed rgba(6,182,212,0.3);
    display: inline-block;
  }
  .ur-model:hover { color: var(--cyan); }
  .ur-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: #1a2035;
    border: 1px solid rgba(6,182,212,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    white-space: nowrap;
    z-index: 200;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    min-width: 160px;
  }
  .ur-tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: #1a2035;
  }
  .ur-model:hover .ur-tooltip { display: block; }
  .ur-tooltip-label {
    font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim); margin-bottom: 4px;
  }
  .ur-tooltip-ip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 600; color: var(--cyan);
  }
  .ur-ip-edit-wrap {
    display: flex; align-items: center; gap: 8px; margin-top: 6px;
  }
  .ur-ip-input {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    color: var(--cyan);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 600;
    padding: 8px 12px;
    outline: none;
    width: 180px;
    transition: border-color 0.2s;
  }
  .ur-ip-input:focus { border-color: var(--cyan); box-shadow: 0 0 10px rgba(6,182,212,0.1); }
  .ur-ip-save-btn {
    padding: 6px 12px; border-radius: 8px;
    background: rgba(6,182,212,0.1); color: var(--cyan);
    border: 1px solid rgba(6,182,212,0.2);
    font-size: 11px; font-weight: 700; font-family: 'Inter', sans-serif;
    cursor: pointer; transition: all 0.2s;
  }
  .ur-ip-save-btn:hover { background: rgba(6,182,212,0.2); }

  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; }
    .header { padding: 16px; }
    .container { padding: 16px; }
    .detail-container { padding: 16px; }
    .detail-header { padding: 20px; flex-direction: column; gap: 12px; align-items: flex-start; }
    .detail-body { padding: 20px; }
    .detail-footer { padding: 16px 20px; }
    .info-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div style="display:flex; align-items:center; gap:12px;">
      <svg width="58" height="58" viewBox="0 0 100 100" fill="none">
        <circle cx="50" cy="50" r="46" stroke="white" stroke-width="3.5" fill="none"/>
        <text x="50" y="60" text-anchor="middle" fill="white" font-family="'Courier New', monospace" font-weight="bold" font-size="34" letter-spacing="3">EGI</text>
      </svg>
      <div style="font-family:'Courier New',monospace; color:white; font-size:12px; font-weight:600; line-height:1.3; letter-spacing:1px;">Embodied<br>General<br>Intelligence</div>
    </div>
    <div style="border-left: 1px solid rgba(255,255,255,0.15); padding-left: 20px; margin-left: 4px;">

// --- State management via Supabase ---
var state = {};
var currentView = 'grid'; // 'grid' or 'detail'
var currentDetailId = null;

function getS(id) {
  if (!state[id]) {
    var station = stations.find(function(s) { return s.id === id; });
    state[id] = { online: false, notes: station ? station.defaultNotes.slice() : [], last_changed: 0, robot_ips: {}, station_ip: null, station_state: null };
  }
  if (!state[id].robot_ips) state[id].robot_ips = {};
  return state[id];
}

function getStationIp(id) {
  var s = getS(id);
  var station = stations.find(function(st) { return st.id === id; });
  return s.station_ip || (station ? station.ip : 'Not assigned');
}

function getStationState(id) {
  var s = getS(id);
  var station = stations.find(function(st) { return st.id === id; });
  return s.station_state || (station ? station.state : 'OPERATIONAL');
}

function saveStationIp(id, ip) {
  var s = getS(id);
  s.station_ip = ip.trim();
  s.last_changed = Date.now();
  state[id] = s;
  saveStation(id);
  renderAll();
}

function toggleStationState(id) {
  var current = getStationState(id);
  var s = getS(id);
  s.station_state = (current === 'OPERATIONAL') ? 'NOT OPERATIONAL' : 'OPERATIONAL';
  s.last_changed = Date.now();
  state[id] = s;
  saveStation(id);
  renderAll();
}

function handleStationIpKey(e, id) {
  if (e.key === 'Enter') {
    e.preventDefault();
    var input = document.getElementById('station-ip-input-' + id);
    if (input) saveStationIp(id, input.value);
  }
}

function getRobotIp(stationId, urKey) {
  var s = getS(stationId);
  return s.robot_ips[urKey] || 'Not assigned';
}

function saveRobotIp(stationId, urKey, ip) {
  var s = getS(stationId);
  s.robot_ips[urKey] = ip.trim();
  s.last_changed = Date.now();
  state[stationId] = s;
  saveStation(stationId);
  renderAll();
}

function handleIpKey(e, stationId, urKey) {
  if (e.key === 'Enter') {
    e.preventDefault();
    var input = document.getElementById('ip-input-' + urKey);
    if (input) saveRobotIp(stationId, urKey, input.value);
  }
}

function updateCounts() {
  var on = 0, off = 0;
  stations.forEach(function(s) { if (getS(s.id).online) on++; else off++; });
  document.getElementById('online-count').textContent = on;
  document.getElementById('offline-count').textContent = off;
}

function fmtTime(ts) {
  if (!ts) return 'never';
  var d = new Date(ts);
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }) + ' ' +
         d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

function saveStation(id) {
  var s = getS(id);
  sb.from('stations').upsert({
    id: id,
    online: s.online,
    notes: s.notes,
    last_changed: s.last_changed,
    robot_ips: s.robot_ips || {},
    station_ip: s.station_ip || null,
    station_state: s.station_state || null
  }).then(function(res) {
    if (res.error) console.error('Save error:', res.error);
  });
}

function toggleStation(id) {
  var s = getS(id);
  s.online = !s.online;
  s.last_changed = Date.now();
  state[id] = s;
  saveStation(id);
  renderAll();
}

function setAll(online) {
  stations.forEach(function(st) {
    var s = getS(st.id);
    s.online = online;
    s.last_changed = Date.now();
    state[st.id] = s;
    saveStation(st.id);
  });
  renderAll();
}

function addNote(id) {
  var input = document.getElementById('note-input-' + id);
  var text = input.value.trim();
  if (!text) return;
  var s = getS(id);
  s.notes.push(text);
  s.last_changed = Date.now();
  state[id] = s;
  saveStation(id);
  renderAll();
}

function removeNote(id, idx) {
  var s = getS(id);
  s.notes.splice(idx, 1);
  s.last_changed = Date.now();
  state[id] = s;
  saveStation(id);
  renderAll();
}

function handleNoteKey(e, id) {
  if (e.key === 'Enter') {
    e.preventDefault();
    addNote(id);
  }
}

// --- Navigation ---
function showDetail(id) {
  currentView = 'detail';
  currentDetailId = id;
  document.getElementById('grid-view').classList.add('hidden');
  document.getElementById('detail-view').classList.add('active');
  renderDetail(id);
  window.scrollTo(0, 0);
}

function showGrid() {
  currentView = 'grid';
  currentDetailId = null;
  document.getElementById('grid-view').classList.remove('hidden');
  document.getElementById('detail-view').classList.remove('active');
}

function handleCardClick(e, id) {
  // Don't navigate if clicking on buttons, inputs, or remove-note spans
  var tag = e.target.tagName.toLowerCase();
  if (tag === 'button' || tag === 'input' || e.target.classList.contains('remove-note')) return;
  // Also check parent for note tags
  if (e.target.closest('.toggle-btn') || e.target.closest('.note-input') || e.target.closest('.remove-note')) return;
  showDetail(id);
}

// --- Load from Supabase ---
async function loadFromSupabase() {
  var res = await sb.from('stations').select('*');
  if (res.error) {
    console.error('Load error:', res.error);
    return;
  }
  if (res.data) {
    res.data.forEach(function(row) {
      state[row.id] = {
        online: row.online,
        notes: row.notes || [],
        last_changed: row.last_changed || 0,
        robot_ips: row.robot_ips || {},
        station_ip: row.station_ip || null,
        station_state: row.station_state || null
      };
    });
  }
  renderAll();
}

// Realtime subscription
sb.channel('stations-changes')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'stations' }, function(payload) {
    var row = payload.new;
    if (row && row.id) {
      state[row.id] = {
        online: row.online,
        notes: row.notes || [],
        last_changed: row.last_changed || 0,
        robot_ips: row.robot_ips || {},
        station_ip: row.station_ip || null,
        station_state: row.station_state || null
      };
      renderAll();
    }
  })
  .subscribe();

// --- Render Grid Card ---
function renderCard(station) {
  var st = getS(station.id);
  var cls = st.online ? 'online' : 'offline';
  var label = st.online ? 'ONLINE' : 'OFFLINE';
  var btn = st.online ? 'Set Offline' : 'Set Online';
  var icon = station.dual ? dualArmSvg(st.online) : robotSvg(st.online);

  var rows = station.robots.map(function(r) {
    var modelHtml = r.model;
    if (r.isUR && r.urKey) {
      var rip = getRobotIp(station.id, r.urKey);
      modelHtml = '<span class="ur-model" onclick="event.stopPropagation()">' + r.model +
        '<div class="ur-tooltip">' +
          '<div class="ur-tooltip-label">IP Address</div>' +
          '<div class="ur-tooltip-ip">' + rip + '</div>' +
        '</div>' +
      '</span>';
    }
    return '<tr><td>' + r.role + '</td><td>' + modelHtml + '</td></tr>';
  }).join('');

  var subtitleHtml = station.subtitle
    ? '<div class="card-subtitle">' + station.subtitle + '</div>' : '';

  var notesHtml = '';
  var notes = st.notes || [];
  var noteTagsHtml = '';
  if (notes.length) {
    noteTagsHtml = '<div class="notes-list">' + notes.map(function(n, i) {
      return '<span class="note-tag"><span class="note-dot"></span>' + n +
        '<span class="remove-note" onclick="event.stopPropagation(); removeNote(\'' + station.id + '\',' + i + ')" title="Remove">&times;</span></span>';
    }).join('') + '</div>';
  }
  notesHtml = '<div class="notes-section">' +
    noteTagsHtml +
    '<input class="note-input" id="note-input-' + station.id + '" type="text" placeholder="Add a note and press Enter..." onkeydown="handleNoteKey(event,\'' + station.id + '\')" onclick="event.stopPropagation()">' +
    '</div>';

  var stateColors = {
    'OPERATIONAL': { bg: 'rgba(34,197,94,0.1)', color: '#22c55e', border: 'rgba(34,197,94,0.15)' },
    'INTEGRATING': { bg: 'rgba(234,179,8,0.1)', color: '#eab308', border: 'rgba(234,179,8,0.15)' },
    'NOT OPERATIONAL': { bg: 'rgba(239,68,68,0.1)', color: '#ef4444', border: 'rgba(239,68,68,0.15)' }
  };
  var currentState = getStationState(station.id);
  var pc = stateColors[currentState] || stateColors['INTEGRATING'];
  var stateTag = '<span onclick="event.stopPropagation(); toggleStationState(\'' + station.id + '\')" style="display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;background:' + pc.bg + ';color:' + pc.color + ';border:1px solid ' + pc.border + ';letter-spacing:0.5px;margin-left:8px;cursor:pointer;transition:all 0.2s;" title="Click to toggle state">' + currentState + '</span>';

  return '<div class="card ' + cls + '" onclick="handleCardClick(event,\'' + station.id + '\')">' +
    '<div class="card-header">' +
      '<div class="card-title-area">' +
        '<div class="robot-icon">' + icon + '</div>' +
        '<div>' +
          '<div class="card-title">' + station.name + stateTag + '</div>' +
          subtitleHtml +
          '<div class="card-type">' + station.type + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="status-pill ' + cls + '">' +
        '<div class="status-dot ' + cls + '"></div>' +
        label +
      '</div>' +
    '</div>' +
    '<div class="card-body">' +
      '<table class="robot-table">' +
        '<tr><th>Role</th><th>Model</th></tr>' +
        rows +
      '</table>' +
      notesHtml +
    '</div>' +
    '<div class="card-footer">' +
      '<button class="toggle-btn" onclick="event.stopPropagation(); toggleStation(\'' + station.id + '\')">' + btn + '</button>' +
      '<div class="status-time">' + (st.last_changed ? fmtTime(st.last_changed) : 'never toggled') + '</div>' +
    '</div>' +
    '<div class="click-hint">Click to view details</div>' +
  '</div>';
}

// --- Render Detail View ---
function renderDetail(id) {
  var station = stations.find(function(s) { return s.id === id; });
  if (!station) return;
  var st = getS(id);
  var cls = st.online ? 'online' : 'offline';
  var label = st.online ? 'ONLINE' : 'OFFLINE';
  var btn = st.online ? 'Set Offline' : 'Set Online';
  var icon = station.dual ? dualArmSvgLarge(st.online) : robotSvgLarge(st.online);

  var subtitleHtml = station.subtitle
    ? '<div class="detail-subtitle">' + station.subtitle + '</div>' : '';

  var dpc = {
    'OPERATIONAL': { color: '#22c55e', bg: 'rgba(34,197,94,0.1)', border: 'rgba(34,197,94,0.2)' },
    'INTEGRATING': { color: '#eab308', bg: 'rgba(234,179,8,0.1)', border: 'rgba(234,179,8,0.2)' },
    'NOT OPERATIONAL': { color: '#ef4444', bg: 'rgba(239,68,68,0.1)', border: 'rgba(239,68,68,0.2)' }
  };
  var currentState = getStationState(id);
  var dpci = dpc[currentState] || dpc['INTEGRATING'];
  var stateColor = dpci.color;
  var stateBg = dpci.bg;
  var stateBorder = dpci.border;
  var currentIp = getStationIp(id);

  // Current robots table
  var currentRows = station.robots.map(function(r) {
    var payloadHtml = r.payload ? '<span class="payload-cell">' + r.payload + 'g</span>' : '<span style="color:#334155">-</span>';
    var spanHtml = r.span ? '<span class="span-cell">' + r.span + 'mm</span>' : '<span style="color:#334155">-</span>';
    var ipHtml = '';
    if (r.isUR && r.urKey) {
      var rip = getRobotIp(id, r.urKey);
      ipHtml = '<td>' +
        '<div class="ur-ip-edit-wrap">' +
          '<input class="ur-ip-input" id="ip-input-' + r.urKey + '" type="text" value="' + (rip !== 'Not assigned' ? rip : '') + '" placeholder="Enter IP..." onkeydown="handleIpKey(event,\'' + id + '\',\'' + r.urKey + '\')">' +
          '<button class="ur-ip-save-btn" onclick="var v=document.getElementById(\'ip-input-' + r.urKey + '\').value; saveRobotIp(\'' + id + '\',\'' + r.urKey + '\',v)">Save</button>' +
        '</div>' +
      '</td>';
    } else {
      ipHtml = '<td><span style="color:#334155">-</span></td>';
    }
    return '<tr>' +
      '<td>' + r.role + '</td>' +
      '<td>' + r.model + '</td>' +
      '<td>' + payloadHtml + '</td>' +
      '<td>' + spanHtml + '</td>' +
      ipHtml +
    '</tr>';
  }).join('');

  // Notes
  var notes = st.notes || [];
  var noteTagsHtml = '';
  if (notes.length) {
    noteTagsHtml = '<div class="notes-list">' + notes.map(function(n, i) {
      return '<span class="note-tag"><span class="note-dot"></span>' + n +
        '<span class="remove-note" onclick="removeNote(\'' + id + '\',' + i + ')" title="Remove">&times;</span></span>';
    }).join('') + '</div>';
  }

  var mobilityClass = station.mobility.toLowerCase().startsWith('yes') ? 'mobility-yes' : 'mobility-no';

  var html =
    '<button class="back-btn" onclick="showGrid()">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>' +
      'Back to Dashboard' +
    '</button>' +
    '<div class="detail-card ' + cls + '">' +
      '<div class="detail-header">' +
        '<div class="detail-header-left">' +
          '<div class="detail-icon">' + icon + '</div>' +
          '<div>' +
            '<div class="detail-name">' + station.name + '</div>' +
            subtitleHtml +
            '<div class="detail-type">' + station.type + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="status-pill ' + cls + '" style="font-size:14px; padding:8px 18px;">' +
          '<div class="status-dot ' + cls + '"></div>' +
          label +
        '</div>' +
      '</div>' +
      '<div class="detail-body">' +
        // Station info section
        '<div class="detail-section">' +
          '<div class="detail-section-title">Station Info</div>' +
          '<div class="info-grid">' +
            '<div class="info-item">' +
              '<div class="info-label">IP Address</div>' +
              '<div class="ur-ip-edit-wrap" style="margin-top:0;">' +
                '<input class="ur-ip-input" id="station-ip-input-' + id + '" type="text" value="' + (currentIp !== 'Not assigned' && currentIp !== 'Offline, no IP' ? currentIp : '') + '" placeholder="Enter IP..." onkeydown="handleStationIpKey(event,\'' + id + '\')" style="width:150px;">' +
                '<button class="ur-ip-save-btn" onclick="var v=document.getElementById(\'station-ip-input-' + id + '\').value; saveStationIp(\'' + id + '\',v)">Save</button>' +
              '</div>' +
            '</div>' +
            '<div class="info-item">' +
              '<div class="info-label">Hostname</div>' +
              '<div class="info-value" style="color:var(--purple);">' + (station.host || 'N/A') + '</div>' +
            '</div>' +
            '<div class="info-item">' +
              '<div class="info-label">Connection</div>' +
              '<div class="info-value" style="color:' + (station.connection === 'Wired' ? 'var(--green)' : 'var(--yellow)') + ';">' + (station.connection || 'N/A') + '</div>' +
            '</div>' +
            '<div class="info-item">' +
              '<div class="info-label">State</div>' +
              '<div class="info-value"><span onclick="toggleStationState(\'' + id + '\')" style="display:inline-block;padding:3px 10px;border-radius:8px;font-size:12px;font-weight:700;background:' + stateBg + ';color:' + stateColor + ';border:1px solid ' + stateBorder + ';cursor:pointer;transition:all 0.2s;" title="Click to toggle state">' + currentState + '</span></div>' +
            '</div>' +
            '<div class="info-item">' +
              '<div class="info-label">Current Task</div>' +
              '<div class="info-value task-val">' + station.task + '</div>' +
            '</div>' +
            '<div class="info-item">' +
              '<div class="info-label">Mobility</div>' +
              '<div class="info-value ' + mobilityClass + '">' + station.mobility + '</div>' +
            '</div>' +
            '<div class="info-item">' +
              '<div class="info-label">Last Changed</div>' +
              '<div class="info-value" style="font-size:13px;">' + (st.last_changed ? fmtTime(st.last_changed) : 'Never') + '</div>' +
            '</div>' +
            '<div class="info-item">' +
              '<div class="info-label">Status</div>' +
              '<div class="info-value status-label" style="color:' + (st.online ? 'var(--green)' : 'var(--red)') + ';">' + label + '</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        // Current robot config
        '<div class="detail-section">' +
          '<div class="detail-section-title">Current Robot Configuration</div>' +
          '<table class="detail-robot-table">' +
            '<tr><th>Role</th><th>Model</th><th>Payload</th><th>Span</th><th>IP Address</th></tr>' +
            currentRows +
          '</table>' +
        '</div>' +
        // Notes section
        '<div class="detail-section">' +
          '<div class="detail-section-title">Notes</div>' +
          '<div class="detail-notes-section">' +
            noteTagsHtml +
            '<input class="note-input" id="note-input-' + id + '" type="text" placeholder="Add a note and press Enter..." onkeydown="handleNoteKey(event,\'' + id + '\')">' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="detail-footer">' +
        '<button class="detail-toggle-btn" onclick="toggleStation(\'' + id + '\')">' + btn + '</button>' +
        '<div class="status-time">Last toggled: ' + (st.last_changed ? fmtTime(st.last_changed) : 'never') + '</div>' +
      '</div>' +
    '</div>';

  document.getElementById('detail-content').innerHTML = html;
}

// --- Render All ---
function renderAll() {
  document.getElementById('station-grid').innerHTML = stations.map(renderCard).join('');
  updateCounts();
  document.getElementById('last-updated').textContent = fmtTime(Date.now());

  // If detail view is open, re-render it too
  if (currentView === 'detail' && currentDetailId) {
    renderDetail(currentDetailId);
  }
}

// Handle back button in browser
window.addEventListener('popstate', function() {
  if (currentView === 'detail') {
    showGrid();
  }
});

// Initial load
loadFromSupabase();
</script>
</body>
</html>
